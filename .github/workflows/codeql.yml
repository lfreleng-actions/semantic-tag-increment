name: 'CodeQL'
# Named codeql.yml NOT codeql.yaml (GitHub security UI will ignore it)

on:
  workflow_dispatch:
  push:
    branches: ['main', 'master']
    paths:
      - '!.github/**'
      - '!.docs/**'
  schedule:
    - cron: '40 4 * * 0'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  scan:
    name: 'Audit Repository'
    # yamllint disable-line rule:line-length
    uses: lfit/releng-reusable-workflows/.github/workflows/reuse-python-codeql.yaml@5fa62e396473e823e2bb0f45b744e94c4f842faa # v0.7.4
    permissions:
      security-events: write  # Upload CodeQL scan results
      packages: read  # Fetch internal or private CodeQL packs
      actions: read  # Only required for workflows in private repositories
      contents: read
